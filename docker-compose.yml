services:
  app:
    build: .
    ports:
      - "3000:3000"
    restart: unless-stopped
    environment:
      PORT: ${PORT:-3000}
      DATABASE_URL: ${DATABASE_URL:-postgres://bytext:bytext@db:5432/bytext}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:3000}
      ACCESS_TOKEN_COOKIE_NAME: ${ACCESS_TOKEN_COOKIE_NAME:-bytext_access}
      NODE_ENV: ${NODE_ENV:-production}
      TRUST_PROXY: ${TRUST_PROXY:-0}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    # NOTE: в production убрать ports — БД не должна торчать наружу.
    # Оставлено только для локальной разработки.
    ports:
      - "127.0.0.1:5432:5432"
    restart: unless-stopped
    environment:
      POSTGRES_DB: bytext
      POSTGRES_USER: bytext
      POSTGRES_PASSWORD: bytext
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bytext -d bytext"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - bytext_pgdata:/var/lib/postgresql/data

volumes:
  bytext_pgdata:
